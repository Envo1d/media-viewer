name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  build-and-release:
    name: Build & Release (Windows x86-64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-windows"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.413
          VER="${TAG#v}"                    # e.g.   1.2.413
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build nexa-updater.exe
        env:
          NEXA_PUBLIC_KEY: ${{ secrets.NEXA_PUBLIC_KEY }}
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p nexa-updater
        shell: bash

      - name: Build Nexa.exe
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p Nexa
        shell: bash

      - name: Sign Nexa.exe
        env:
          NEXA_SIGNING_KEY: ${{ secrets.NEXA_SIGNING_KEY }}
        shell: bash
        run: |
          # Write the signing key to a temp file so sign-release can read it.
          # Using a file avoids the key appearing in `ps` output.
          KEY_FILE="$(mktemp)"
          printf '%s' "$NEXA_SIGNING_KEY" > "$KEY_FILE"

          cargo run --release -p sign-release -- \
            target/x86_64-pc-windows-msvc/release/Nexa.exe \
            "$KEY_FILE"

          # Verify the .sig was produced.
          ls -lh target/x86_64-pc-windows-msvc/release/Nexa.exe.sig

          # Zero the temp file.
          dd if=/dev/zero of="$KEY_FILE" bs=1 count=64 2>/dev/null || true
          rm -f "$KEY_FILE"

      - name: Collect artefacts
        shell: bash
        run: |
          mkdir release-assets
          cp target/x86_64-pc-windows-msvc/release/Nexa.exe          release-assets/
          cp target/x86_64-pc-windows-msvc/release/Nexa.exe.sig      release-assets/
          cp target/x86_64-pc-windows-msvc/release/nexa-updater.exe  release-assets/

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Nexa ${{ steps.version.outputs.ver }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/Nexa.exe
            release-assets/Nexa.exe.sig
            release-assets/nexa-updater.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signature (sanity check)
        shell: bash
        run: |
          # Build and run the verifier inline using the public key.
          cat > /tmp/verify_check.py << 'PYEOF'
          import sys, binascii

          pub_hex = "${{ secrets.NEXA_PUBLIC_KEY }}"
          pub_bytes = binascii.unhexlify(pub_hex)

          with open("release-assets/Nexa.exe", "rb") as f:
              exe = f.read()
          with open("release-assets/Nexa.exe.sig", "rb") as f:
              sig = f.read()

          assert len(pub_bytes) == 32, "bad public key length"
          assert len(sig)       == 64, "bad signature length"

          try:
              from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PublicKey
              key = Ed25519PublicKey.from_public_bytes(pub_bytes)
              key.verify(sig, exe)
              print("Signature verification: OK")
          except ImportError:
              print("cryptography library not available — skipping Python verify")
          except Exception as e:
              print(f"VERIFICATION FAILED: {e}")
              sys.exit(1)
          PYEOF
          python /tmp/verify_check.py || true
