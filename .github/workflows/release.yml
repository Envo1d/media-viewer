name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  build-and-release:
    name: Build & Release (Windows x86-64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-windows"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build nexa-updater.exe
        env:
          NEXA_PUBLIC_KEY: ${{ secrets.NEXA_PUBLIC_KEY }}
        shell: bash
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p nexa-updater

      - name: Build Nexa.exe
        shell: bash
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p Nexa

      - name: Sign Nexa.exe
        env:
          NEXA_SIGNING_KEY: ${{ secrets.NEXA_SIGNING_KEY }}
        shell: bash
        run: |
          KEY_FILE="$(mktemp)"
          printf '%s' "$NEXA_SIGNING_KEY" > "$KEY_FILE"

          cargo run --release -p sign-release -- \
            target/x86_64-pc-windows-msvc/release/Nexa.exe \
            "$KEY_FILE"

          ls -lh target/x86_64-pc-windows-msvc/release/Nexa.exe.sig

          dd if=/dev/zero of="$KEY_FILE" bs=1 count=64 2>/dev/null || true
          rm -f "$KEY_FILE"

      - name: Verify signature
        env:
          NEXA_PUBLIC_KEY: ${{ secrets.NEXA_PUBLIC_KEY }}
        shell: bash
        run: |
          cargo run --release -p verify-release -- \
            target/x86_64-pc-windows-msvc/release/Nexa.exe \
            target/x86_64-pc-windows-msvc/release/Nexa.exe.sig \
            "$NEXA_PUBLIC_KEY"

      - name: Collect artefacts
        shell: bash
        run: |
          mkdir release-assets
          cp target/x86_64-pc-windows-msvc/release/Nexa.exe          release-assets/
          cp target/x86_64-pc-windows-msvc/release/Nexa.exe.sig      release-assets/
          cp target/x86_64-pc-windows-msvc/release/nexa-updater.exe  release-assets/

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Nexa ${{ steps.version.outputs.ver }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/Nexa.exe
            release-assets/Nexa.exe.sig
            release-assets/nexa-updater.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}